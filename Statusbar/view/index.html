<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <script src="nui://game/ui/jquery.js" type="text/javascript"></script>
	<script src="index.js"></script>
    <script src="js/jquery-3.7.0.min.js"></script>
	<link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" >
    <link rel="stylesheet" href="font-awesome-pro-5/css/all.min.css">
	<title>ssss</title>
</head>

<body>
    <div class="container">
        <div class="profile-box">
            <img id="profile" src="img/default.png" alt="">
        </div>
        <div class="hud">
            <div class="Food-Notify">
				<div class="Food-img"></div>
			</div>
			<div class="Stress-Notify">
				<div class="Stress-img"></div>
			</div>
            <div class="top">
                <div class="id-box">
                    <div class="bg"></div>
                    <div class="id" id="id">ID : 2440</div>
                </div>
                <div class="stamina-box">
                    <div class="stamina" id="stamina"></div>
                </div>
            </div>
            <div class="health-box">
                <div class="health" id="health"></div>
                <i class="fa-solid fa-heart-pulse"></i>
                <div class="health-text" id="health-text">100</div>
            </div>
            <div class="bottom">
                <div class="armor-box">
                    <div class="armor" id="armor"></div>
                </div>
                <div class="mini-voice-box">
                    <div class="bg"></div>
                    <div class="circle-box">
                        <i class="fas fa-circle color" id="fa-circle1"></i>
                        <i class="fas fa-circle color" id="fa-circle2"></i>
                        <i class="fas fa-circle" id="fa-circle3"></i>
                    </div>
                </div>
            </div>
        </div>
            </div>
        </div>
    </div>
    <div class="job-online">
        <div class="job-box">
            <div class="job-img">
                <img src="img/police.png" alt="">
            </div>
            <div class="text" id="police">99</div>
        </div>
        <div class="job-box">
            <div class="job-img">
                <img src="img/doctor.png" alt="">
            </div>
            <div class="text" id="ambulance">99</div>
        </div>
    </div>
    <div class="voice-box">
        <div class="voice-img">
            <img id="voice-img" src="img/voice/normal.png" alt="">
        </div>
        <div class="voice-text" id="voice-text">ปกติ</div>
        <div class="voice-js">
            <div class="voice active" id="voice1"></div>
            <div class="voice active" id="voice2"></div>
            <div class="voice" id="voice3"></div>
        </div>
    </div>
    <div class="date">
        <div class="text-box">
            <i class="fas fa-calendar-days"></i>
            <div class="text" id="date"></div>
        </div>
        <div class="text-box">
            <i class="fas fa-alarm-clock"></i>
            <div class="text" id="time"></div>
        </div>
    </div>
    <script src="nui://game/ui/jquery.js" type="text/javascript"></script>
    <script src="script.js" type="text/javascript"></script>
</body>
</html>
